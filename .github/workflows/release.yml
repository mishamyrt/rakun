name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    env:
      RELEASE_TARGETS: |
        linux/arm32
        linux/arm64
        linux/amd64
        darwin/arm64
        darwin/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release assets
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG#v}"

          rm -rf build dist
          mkdir -p dist

          while IFS= read -r target; do
            [ -n "${target}" ] || continue

            make "build/${target}/rakun" VERSION="${version}"

            archive="rakun_${TAG}_${target//\//_}.tar.gz"
            tar -C "build/${target}" -czf "dist/${archive}" rakun
          done <<< "${RELEASE_TARGETS}"

          (
            cd dist
            sha256sum *.tar.gz > sha256sums.txt
          )

      - name: Extract release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG#v}"

          awk -v version="${version}" '
            BEGIN {
              header = "## [" version "]"
              capture = 0
              found = 0
              printed = 0
            }
            index($0, header) == 1 {
              capture = 1
              found = 1
            }
            capture {
              if (printed && ($0 ~ /^## \[/ || $0 ~ /^<!-- generated by git-cliff -->/)) {
                exit
              }

              print
              printed = 1
            }
            END {
              if (!found) {
                printf("Release notes for version %s were not found in CHANGELOG.md\n", version) > "/dev/stderr"
                exit 1
              }
            }
          ' CHANGELOG.md > dist/release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/sha256sums.txt
          fail_on_unmatched_files: true
          overwrite_files: true
