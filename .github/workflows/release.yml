name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release assets
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG#v}"

          rm -rf build dist
          make all VERSION="${version}"

          mkdir -p dist

          while IFS= read -r binary; do
            target="${binary#build/}"
            os="${target%%/*}"
            arch="${target#*/}"
            arch="${arch%%/*}"
            archive="rakun_${TAG}_${os}_${arch}.tar.gz"

            tar -C "$(dirname "${binary}")" -czf "dist/${archive}" "$(basename "${binary}")"
          done < <(find build -type f -name rakun | sort)

          (
            cd dist
            sha256sum *.tar.gz > sha256sums.txt
          )

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/sha256sums.txt
          fail_on_unmatched_files: true
          overwrite_files: true
