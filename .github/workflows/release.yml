name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    env:
      RELEASE_TARGETS: |
        linux/arm32
        linux/arm64
        linux/amd64
        darwin/arm64
        darwin/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release assets
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG#v}"

          rm -rf build dist
          mkdir -p dist

          while IFS= read -r target; do
            [ -n "${target}" ] || continue

            make "build/${target}/rakun" VERSION="${version}"

            archive="rakun_${TAG}_${target//\//_}.tar.gz"
            tar -C "build/${target}" -czf "dist/${archive}" rakun
          done <<< "${RELEASE_TARGETS}"

          (
            cd dist
            sha256sum *.tar.gz > sha256sums.txt
          )

      - name: Extract release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG#v}"

          awk -v version="${version}" '
            BEGIN {
              header = "## [" version "]"
              capture = 0
              found = 0
              printed = 0
            }
            index($0, header) == 1 {
              capture = 1
              found = 1
            }
            capture {
              if (printed && ($0 ~ /^## \[/ || $0 ~ /^<!-- generated by git-cliff -->/)) {
                exit
              }

              print
              printed = 1
            }
            END {
              if (!found) {
                printf("Release notes for version %s were not found in CHANGELOG.md\n", version) > "/dev/stderr"
                exit 1
              }
            }
          ' CHANGELOG.md > dist/release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/sha256sums.txt
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6.0.2
        with:
          repository: mishamyrt/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN || vars.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG#v}"

          archive_sha() {
            local archive="$1"
            local sha

            sha="$(awk -v archive="${archive}" '$2 == archive { print $1 }' dist/sha256sums.txt)"
            if [ -z "${sha}" ]; then
              printf 'Checksum for %s was not found in dist/sha256sums.txt\n' "${archive}" >&2
              exit 1
            fi

            printf '%s\n' "${sha}"
          }

          arm64_archive="rakun_${TAG}_darwin_arm64.tar.gz"
          amd64_archive="rakun_${TAG}_darwin_amd64.tar.gz"
          arm64_sha="$(archive_sha "${arm64_archive}")"
          amd64_sha="$(archive_sha "${amd64_archive}")"

          cat > homebrew-tap/Formula/rakun.rb <<EOF
          class Rakun < Formula
            desc "Remote repositories synchronizer"
            homepage "https://github.com/mishamyrt/rakun"
            version "${version}"
            license "GPL-3.0"

            depends_on :macos

            if Hardware::CPU.arm?
              url "https://github.com/mishamyrt/rakun/releases/download/${TAG}/${arm64_archive}"
              sha256 "${arm64_sha}"
            else
              url "https://github.com/mishamyrt/rakun/releases/download/${TAG}/${amd64_archive}"
              sha256 "${amd64_sha}"
            end

            def install
              bin.install "rakun"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/rakun --version")
            end
          end
          EOF

          cd homebrew-tap

          if git diff --quiet -- Formula/rakun.rb; then
            echo "Homebrew formula is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/rakun.rb
          git commit -m "Update rakun formula to ${TAG}"
          git push
